name: Legacy Tauri Build and Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag for the legacy desktop build, e.g. v0.93'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: 'src-tauri -> target'

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''
        with:
          tagName: ${{ inputs.tag }}
          releaseName: 'ATC Tools Desktop Legado ${{ inputs.tag }}'
          releaseBody: |
            ## ATC Tools Desktop Legado ${{ inputs.tag }}

            Esta build Tauri e mantida apenas como legado. O produto principal e a versao web publicada pelo GitHub Pages.

            ### Antes de usar em producao
            - Conferir versoes em package.json, tauri.conf.json e Cargo.toml
            - Conferir dados embutidos em src-tauri/data_*.json
            - Validar assinatura, updater e instaladores

            ### Changelog
            Ver commits para detalhes das mudancas.
          releaseDraft: false
          prerelease: false

