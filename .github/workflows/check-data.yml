name: Check Official Data

on:
  schedule:
    - cron: '0 11 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check official data freshness
        shell: bash
        run: |
          set +e
          node scripts/check-data.mjs --fail-on-change
          status=$?
          set -e

          if [ "$status" -eq 0 ]; then
            echo "Official data is current."
          elif [ "$status" -eq 2 ]; then
            echo "::warning title=Dados oficiais mudaram::Mudanca detectada nas fontes oficiais. O workflow Update Official Data vai sincronizar e publicar automaticamente."
          elif [ "$status" -eq 3 ]; then
            echo "::warning title=Fontes oficiais indisponiveis::DECEA inacessivel (rede) apos varias tentativas. Verificacao pulada; tenta novamente amanha."
          else
            exit "$status"
          fi
