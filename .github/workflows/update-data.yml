name: Update Official Data

on:
  schedule:
    - cron: '30 11 * * *'
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: official-data-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check for official data changes
        id: check
        shell: bash
        run: |
          set +e
          node scripts/check-data.mjs --fail-on-change
          status=$?
          set -e

          if [ "$status" -eq 0 ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Official data is already current."
          elif [ "$status" -eq 2 ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Official data changed; syncing and publishing."
          else
            exit "$status"
          fi

      - name: Sync official data
        if: steps.check.outputs.changed == 'true'
        run: npm run data:sync

      - name: Validate synced data
        if: steps.check.outputs.changed == 'true'
        run: |
          node scripts/check-data.mjs --fail-on-change
          npm run build
          npm run build:single

      - name: Detect local diff
        if: steps.check.outputs.changed == 'true'
        id: diff
        shell: bash
        run: |
          if git diff --quiet; then
            echo "has_diff=false" >> "$GITHUB_OUTPUT"
            echo "No file changes after sync."
          else
            echo "has_diff=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and publish to default branch
        if: steps.diff.outputs.has_diff == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Atualiza dados oficiais do ROTAER/GeoAISWEB (automatico)"

          # Publica direto no branch padrao; em caso de corrida, rebase e tenta de novo.
          git push origin "HEAD:${DEFAULT_BRANCH}" \
            || ( git pull --rebase origin "${DEFAULT_BRANCH}" \
                 && git push origin "HEAD:${DEFAULT_BRANCH}" )

          # Push via GITHUB_TOKEN nao dispara outros workflows; aciona o deploy explicitamente.
          gh workflow run deploy-pages.yml --ref "${DEFAULT_BRANCH}"
          echo "::notice title=Dados publicados::Dados oficiais atualizados e deploy do GitHub Pages acionado."
